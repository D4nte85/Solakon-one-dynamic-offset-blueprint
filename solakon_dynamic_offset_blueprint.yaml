blueprint:
  name: Solakon ONE — Dynamischer Offset (Spike-Filter + Volatilitäts-Regler)
  description: |
    ### Dynamischer Nullpunkt-Offset
    Filtert Netzspitzen und schreibt den berechneten dynamischen Offset in die Ziel-Helfer.
    
    **Voraussetzung:** Alle Sensoren aus der README müssen angelegt sein.
  domain: automation
  input:
    grid_power_sensor:
      name: 🔌 Netz-Leistungssensor
      description: Der rohe Sensor vom Stromzähler (z.B. Shelly 3EM).
      selector:
        entity:
          domain: sensor
          device_class: power
    grid_stable_helper:
      name: 🗃️ Spike-Filter Puffer
      default: input_number.solakon_netz_spike_gefiltert
      selector:
        entity:
          domain: input_number
    offset_sensor:
      name: 📐 Berechneter Offset Sensor
      default: sensor.solakon_dynamischer_offset
      selector:
        entity:
          domain: sensor
    offset_zone1_helper:
      name: 🎯 Ziel-Helper Offset Zone 1
      default: input_number.solakon_offset_zone1
      selector:
        entity:
          domain: input_number
    offset_zone2_helper:
      name: 🎯 Ziel-Helper Offset Zone 2
      default: input_number.solakon_offset_zone2
      selector:
        entity:
          domain: input_number
    spike_threshold:
      name: ⚡ Spike-Schwelle (W)
      default: 200
      selector:
        number:
          min: 50
          max: 1000
          unit_of_measurement: W
    spike_confirm_time:
      name: ⏱️ Bestätigungszeit (s)
      default: 3
      selector:
        number:
          min: 1
          max: 10
          unit_of_measurement: s

mode: restart # Wichtig: Neustart bricht Bestätigungs-Warten bei neuem Wert ab

trigger:
  - platform: state
    entity_id: !input grid_power_sensor
  - platform: state
    entity_id: !input offset_sensor

action:
  - choose:
      # Zweig 1: Spike-Filterung für Netz-Sensor
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == grid_power_sensor.entity_id if grid_power_sensor is string else trigger.entity_id == grid_power_sensor }}"
        sequence:
          - alias: "Prüfe ob Sprung groß genug für Spike-Verdacht"
            if:
              - condition: template
                value_template: >
                  {% set current = states(grid_power_sensor) | float(0) %}
                  {% set stable = states(grid_stable_helper) | float(0) %}
                  {{ (current - stable) | abs > (spike_threshold | float) }}
            then:
              - delay: !input spike_confirm_time
              - service: input_number.set_value
                target:
                  entity_id: !input grid_stable_helper
                data:
                  value: "{{ states(grid_power_sensor) | float(0) }}"
            else:
              - service: input_number.set_value
                target:
                  entity_id: !input grid_stable_helper
                data:
                  value: "{{ states(grid_power_sensor) | float(0) }}"

      # Zweig 2: Schreiben des berechneten Offsets in die Zonen
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == offset_sensor.entity_id if offset_sensor is string else trigger.entity_id == offset_sensor }}"
        sequence:
          - service: input_number.set_value
            target:
              entity_id: !input offset_zone1_helper
            data:
              value: "{{ states(offset_sensor) | float(30) }}"
          - service: input_number.set_value
            target:
              entity_id: !input offset_zone2_helper
            data:
              value: "{{ states(offset_sensor) | float(30) }}"

