blueprint:
  name: Solakon ONE — Dynamischer Offset (Spike-Filter + Volatilitäts-Regler)
  description: |
    ### Dynamischer Nullpunkt-Offset
    Filtert Netzspitzen und schreibt den berechneten dynamischen Offset direkt
    in die Ziel-Helfer. Der Offset-Sensor (sensor.solakon_dynamischer_offset)
    wird **nicht** mehr benötigt — Berechnung erfolgt intern.

    **Erforderliche Helfer (README Schritte 1–3 + 5):**
    - `input_number.solakon_netz_spike_gefiltert`
    - `sensor.solakon_netz_brucke`
    - `sensor.solakon_grid_stddev_60s`
    - `input_number.solakon_offset_zone1` / `_zone2`
  domain: automation
  input:
    grid_power_sensor:
      name: 🔌 Netz-Leistungssensor
      description: Roher Sensor vom Stromzähler (z.B. Shelly 3EM).
      selector:
        entity:
          domain: sensor
          device_class: power
    grid_stable_helper:
      name: 🗃️ Spike-Filter Puffer
      default: input_number.solakon_netz_spike_gefiltert
      selector:
        entity:
          domain: input_number
    stddev_sensor:
      name: 📊 Statistik-Sensor (StdDev 60s)
      default: sensor.solakon_grid_stddev_60s
      selector:
        entity:
          domain: sensor
    offset_zone1_helper:
      name: 🎯 Ziel-Helper Offset Zone 1
      default: input_number.solakon_offset_zone1
      selector:
        entity:
          domain: input_number
    offset_zone2_helper:
      name: 🎯 Ziel-Helper Offset Zone 2
      default: input_number.solakon_offset_zone2
      selector:
        entity:
          domain: input_number
    spike_threshold:
      name: ⚡ Spike-Schwelle (W)
      default: 200
      selector:
        number:
          min: 50
          max: 1000
          unit_of_measurement: W
    spike_confirm_time:
      name: ⏱️ Bestätigungszeit (s)
      default: 3
      selector:
        number:
          min: 1
          max: 10
          unit_of_measurement: s
    min_offset:
      name: 📉 Minimaler Offset (W)
      default: 30
      selector:
        number:
          min: 0
          max: 200
          unit_of_measurement: W
    cap_offset:
      name: 📈 Maximaler Offset (W)
      default: 250
      selector:
        number:
          min: 50
          max: 1000
          unit_of_measurement: W
    noise_floor:
      name: 🔇 Rausch-Schwelle (W)
      default: 15
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: W
    volatility_factor:
      name: 📊 Volatilitäts-Faktor
      default: 1.5
      selector:
        number:
          min: 0.5
          max: 5.0
          step: 0.1

# Neustart bricht laufendes Spike-Bestätigungs-Delay ab, wenn neuer Wert kommt
mode: restart

# Blueprint-Inputs als Template-Variablen deklarieren (Fix: zuverlässig in allen Kontexten)
variables:
  grid_power_sensor: !input grid_power_sensor
  grid_stable_helper: !input grid_stable_helper
  stddev_sensor: !input stddev_sensor
  spike_threshold: !input spike_threshold
  spike_confirm_time: !input spike_confirm_time
  min_offset: !input min_offset
  cap_offset: !input cap_offset
  noise_floor: !input noise_floor
  volatility_factor: !input volatility_factor

trigger:
  - platform: state
    entity_id: !input grid_power_sensor

action:
  # ── Schritt 1: Spike-Filterung ─────────────────────────────────────────────
  - if:
      - condition: template
        value_template: >
          {{ (states(grid_power_sensor) | float(0) - states(grid_stable_helper) | float(0)) | abs
             > spike_threshold | float(200) }}
    then:
      # Sprung zu groß → warten ob Wert stabil bleibt (Spike-Bestätigung)
      - delay:
          seconds: "{{ spike_confirm_time | int(3) }}"
      - action: input_number.set_value
        target:
          entity_id: !input grid_stable_helper
        data:
          value: "{{ states(grid_power_sensor) | float(0) }}"
    else:
      # Normaler Wert → sofort übernehmen
      - action: input_number.set_value
        target:
          entity_id: !input grid_stable_helper
        data:
          value: "{{ states(grid_power_sensor) | float(0) }}"

  # ── Schritt 2: Dynamischen Offset inline berechnen ─────────────────────────
  - variables:
      dynamic_offset: >
        {% set std_dev = states(stddev_sensor) | float(-1) %}
        {% if std_dev < 0 %}
          {{ min_offset | int(30) }}
        {% else %}
          {% set volatility_buffer = [0, (std_dev - noise_floor) * volatility_factor] | max %}
          {% set result = (min_offset + volatility_buffer) | round(0) | int %}
          {{ [[min_offset | int(30), result] | max, cap_offset | int(250)] | min }}
        {% endif %}

  # ── Schritt 3: Offset in beide Zonen schreiben ─────────────────────────────
  - action: input_number.set_value
    target:
      entity_id: !input offset_zone1_helper
    data:
      value: "{{ dynamic_offset }}"
  - action: input_number.set_value
    target:
      entity_id: !input offset_zone2_helper
    data:
      value: "{{ dynamic_offset }}"
