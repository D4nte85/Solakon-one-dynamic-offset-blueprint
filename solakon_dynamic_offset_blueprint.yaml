blueprint:
  name: Solakon ONE — Dynamischer Offset (Volatilitäts-Regler)
  description: |
    ### Dynamischer Nullpunkt-Offset / Dynamic Zero-Point Offset
    Berechnet einen selbstanpassenden Offset aus der Netz-Volatilität und schreibt ihn in die Ziel-Helfer.
    Calculates a self-adjusting offset from grid volatility and writes it to the target helpers.

    **Erforderliche Helfer / Required helpers:**
    - `sensor.solakon_grid_stddev_60s`
    - `input_number.solakon_offset_zone1` / `_zone2`
  source_url: https://github.com/D4nte85/Solakon-one-dynamic-offset-blueprint/blob/main/solakon_dynamic_offset_blueprint.yaml
  domain: automation
  input:

    # ══════════════════════════════════════════════════════════════════════════
    # ABSCHNITT 1 / SECTION 1 — Sensoren & Helfer (Pflicht / Required)
    # ══════════════════════════════════════════════════════════════════════════
    sensoren_und_helfer:
      name: "🔌 Sensoren & Helfer / Sensors & Helpers"
      description: >
        Pflichtfelder — müssen vor der Blueprint-Einrichtung manuell angelegt werden (siehe README).
        Required fields — must be created manually before setting up the blueprint (see README).
      collapsed: false
      input:

        stddev_sensor:
          name: 📊 Statistik-Sensor (StdDev 60s)
          description: >
            Misst die Standardabweichung des Roh-Netzwerts der letzten 60 s — Spikes inklusive.
            Measures the standard deviation of the raw grid value over 60 s — spikes included.
            Standard / Default: `sensor.solakon_grid_stddev_60s`
          default: sensor.solakon_grid_stddev_60s
          selector:
            entity:
              domain: sensor

        offset_zone1_helper:
          name: 🎯 Ziel-Helper Zone 1 (Optional)
          description: >
            Offset-Ausgabe für Zone 1. Mindestens einer der beiden Helfer muss konfiguriert sein.
            Offset output for Zone 1. At least one of the two helpers must be configured.
            Standard / Default: `input_number.solakon_offset_zone1`
          default: {}
          selector:
            entity:
              domain: input_number

        offset_zone2_helper:
          name: 🎯 Ziel-Helper Zone 2 (Optional)
          description: >
            Offset-Ausgabe für Zone 2. Mindestens einer der beiden Helfer muss konfiguriert sein.
            Offset output for Zone 2. At least one of the two helpers must be configured.
            Standard / Default: `input_number.solakon_offset_zone2`
          default: {}
          selector:
            entity:
              domain: input_number

    # ══════════════════════════════════════════════════════════════════════════
    # ABSCHNITT 2 / SECTION 2 — Offset-Grenzen / Offset Limits
    # ══════════════════════════════════════════════════════════════════════════
    offset_grenzen:
      name: "📏 Offset-Grenzen / Offset Limits"
      description: >
        Definiert den erlaubten Wertebereich des Offsets — unabhängig von der Netzunruhe.
        Defines the allowed offset range — regardless of grid volatility.
      collapsed: true
      input:

        min_offset:
          name: 📉 Minimaler Offset / Minimum Offset (W)
          description: >
            Aktiv bei ruhigem Netz (StdDev unter Rausch-Schwelle). Sollte die Messungenauigkeit abdecken.
            Active when grid is calm (StdDev below noise floor). Should cover measurement inaccuracy.
            Shelly 3EM: ~5–10 W Rauschen / noise → 30–50 W sinnvoll / recommended.
          default: 30
          selector:
            number:
              min: 0
              max: 200
              unit_of_measurement: W

        cap_offset:
          name: 📈 Maximaler Offset / Maximum Offset (W)
          description: >
            Obere Grenze bei sehr unruhigem Netz. Schützt vor übermäßigem Netzbezug.
            Upper limit for very volatile grids. Prevents excessive grid draw.
            Empfehlung / Recommended: 250 W.
          default: 250
          selector:
            number:
              min: 50
              max: 1000
              unit_of_measurement: W

    # ══════════════════════════════════════════════════════════════════════════
    # ABSCHNITT 3 / SECTION 3 — Volatilitäts-Regler / Volatility Controller
    # ══════════════════════════════════════════════════════════════════════════
    volatilitaet:
      name: "📊 Volatilitäts-Regler / Volatility Controller"
      description: >
        Steuert die Empfindlichkeit des Offsets auf Netzschwankungen.
        Controls how sensitively the offset reacts to grid fluctuations.

        `offset = min_offset + max(0, (StdDev − noise_floor) × factor)`
      collapsed: true
      input:

        noise_floor:
          name: 🔇 Rausch-Schwelle / Noise Floor (W)
          description: >
            StdDev unterhalb dieser Schwelle gilt als Messrauschen — löst keine Offset-Erhöhung aus.
            StdDev below this threshold is treated as measurement noise — no offset increase.
            Empfehlung / Recommended: 15 W (Shelly 3EM).
          default: 15
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: W

        volatility_factor:
          name: 📊 Volatilitäts-Faktor / Volatility Factor
          description: >
            Verstärkung der Netz-Volatilität auf den Offset.
            Amplification of grid volatility on the offset.

            Beispiele / Examples (StdDev=80 W, noise_floor=15 W):
            0.5 → +33 W | 1.5 → +98 W (Standard/Default) | 3.0 → +195 W

            Höher / Higher = mehr Schutz, mehr Bezug / more protection, more draw.
            Empfehlung / Recommended: 1.5.
          default: 1.5
          selector:
            number:
              min: 0.5
              max: 5.0
              step: 0.1

# Single: StdDev-Updates während laufender Ausführung werden verworfen — kein Datenverlust, da StdDev träge ist.
# Single: StdDev updates during execution are discarded — no data loss since StdDev changes slowly.
mode: single

variables:
  stddev_sensor: !input stddev_sensor
  min_offset: !input min_offset
  cap_offset: !input cap_offset
  noise_floor: !input noise_floor
  volatility_factor: !input volatility_factor
  offset_zone1_entity: !input offset_zone1_helper
  offset_zone2_entity: !input offset_zone2_helper
  offset_zone1_valid: >
    {{ offset_zone1_entity is string and offset_zone1_entity | length > 0 }}
  offset_zone2_valid: >
    {{ offset_zone2_entity is string and offset_zone2_entity | length > 0 }}

triggers:
  - trigger: state
    entity_id: !input stddev_sensor

actions:
  - condition: template
    value_template: "{{ offset_zone1_valid or offset_zone2_valid }}"

  # ── Offset berechnen / Calculate offset ───────────────────────────────────
  - variables:
      dynamic_offset: >
        {% set std_dev = states(stddev_sensor) | float(-1) %}
        {% if std_dev < 0 %}
          {{ min_offset | int(30) }}
        {% else %}
          {% set volatility_buffer = [0, (std_dev - noise_floor) * volatility_factor] | max %}
          {% set result = (min_offset + volatility_buffer) | round(0) | int %}
          {{ [[min_offset | int(30), result] | max, cap_offset | int(250)] | min }}
        {% endif %}

  # ── Offset in Zonen schreiben / Write offset to zones ─────────────────────
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ offset_zone1_valid }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: "{{ offset_zone1_entity }}"
            data:
              value: "{{ dynamic_offset }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ offset_zone2_valid }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: "{{ offset_zone2_entity }}"
            data:
              value: "{{ dynamic_offset }}"
