blueprint:
  name: Solakon ONE — Dynamischer Offset (Spike-Filter + Volatilitäts-Regler)
  description: |
    ### Dynamischer Nullpunkt-Offset / Dynamic Zero-Point Offset
    Filtert Netzspitzen und schreibt den berechneten Offset in die Ziel-Helfer.
    Filters grid spikes and writes the calculated offset to the target helpers.

    **Erforderliche Helfer / Required helpers:**
    - `input_number.solakon_netz_spike_gefiltert`
    - `sensor.solakon_netz_brucke`
    - `sensor.solakon_grid_stddev_60s`
    - `input_number.solakon_offset_zone1` / `_zone2`
  source_url: https://github.com/D4nte85/Solakon-one-dynamic-offset-blueprint/blob/main/solakon_dynamic_offset_blueprint.yaml
  domain: automation
  input:

    # ══════════════════════════════════════════════════════════════════════════
    # ABSCHNITT 1 / SECTION 1 — Sensoren & Helfer (Pflicht / Required)
    # ══════════════════════════════════════════════════════════════════════════
    sensoren_und_helfer:
      name: "🔌 Sensoren & Helfer / Sensors & Helpers"
      description: >
        Pflichtfelder — müssen vor der Blueprint-Einrichtung manuell angelegt werden (siehe README).
        Required fields — must be created manually before setting up the blueprint (see README).
      collapsed: false
      input:

        grid_power_sensor:
          name: 🔌 Netz-Leistungssensor / Grid Power Sensor
          description: >
            Roher Messwert des Stromzählers — z.B. `sensor.shelly3em_power`.
            Raw meter reading — e.g. `sensor.shelly3em_power`.
          selector:
            entity:
              domain: sensor
              device_class: power

        grid_stable_helper:
          name: 🗃️ Spike-Filter Puffer / Spike-Filter Buffer
          description: >
            `input_number` der den letzten akzeptierten (spike-gefilterten) Netzwert speichert.
            `input_number` storing the last accepted (spike-filtered) grid value.
            Standard / Default: `input_number.solakon_netz_spike_gefiltert`
          default: input_number.solakon_netz_spike_gefiltert
          selector:
            entity:
              domain: input_number

        stddev_sensor:
          name: 📊 Statistik-Sensor (StdDev 60s)
          description: >
            Misst die Standardabweichung des spike-gefilterten Netzwerts der letzten 60 s.
            Measures the standard deviation of the spike-filtered grid value over 60 s.
            Standard / Default: `sensor.solakon_grid_stddev_60s`
          default: sensor.solakon_grid_stddev_60s
          selector:
            entity:
              domain: sensor

        offset_zone1_helper:
          name: 🎯 Ziel-Helper Zone 1 (Optional)
          description: >
            Offset-Ausgabe für Zone 1. Mindestens einer der beiden Helfer muss konfiguriert sein.
            Offset output for Zone 1. At least one of the two helpers must be configured.
            Standard / Default: `input_number.solakon_offset_zone1`
          default: {}
          selector:
            entity:
              domain: input_number

        offset_zone2_helper:
          name: 🎯 Ziel-Helper Zone 2 (Optional)
          description: >
            Offset-Ausgabe für Zone 2. Mindestens einer der beiden Helfer muss konfiguriert sein.
            Offset output for Zone 2. At least one of the two helpers must be configured.
            Standard / Default: `input_number.solakon_offset_zone2`
          default: {}
          selector:
            entity:
              domain: input_number

    # ══════════════════════════════════════════════════════════════════════════
    # ABSCHNITT 2 / SECTION 2 — Spike-Filter
    # ══════════════════════════════════════════════════════════════════════════
    spike_filter:
      name: "⚡ Spike-Filter"
      description: >
        Unterscheidet echte Laständerungen von kurzen Stromspitzen (z.B. Kompressor-Anlaufstrom).
        Echte Änderungen werden nach der Bestätigungszeit übernommen.
        Distinguishes real load changes from short spikes (e.g. compressor inrush).
        Real changes are accepted after the confirmation delay.
      collapsed: true
      input:

        spike_threshold:
          name: ⚡ Spike-Schwelle / Spike Threshold (W)
          description: >
            Abweichung vom letzten Wert, ab der ein Spike-Verdacht ausgelöst wird.
            Deviation from the last value that triggers spike detection.
            Zu niedrig / Too low: verzögert normale Schwankungen.
            Zu hoch / Too high: Anlaufstrom verfälscht die Volatilitätsmessung.
            Empfehlung / Recommended: 300–400 W.
          default: 300
          selector:
            number:
              min: 50
              max: 1000
              unit_of_measurement: W

        spike_confirm_time:
          name: ⏱️ Bestätigungszeit / Confirmation Time (s)
          description: >
            Wartezeit bis ein Spike-Verdacht als echte Laständerung gilt.
            Ein neuer Wert in dieser Zeit (mode: restart) verwirft den Spike.
            Wait time until a spike candidate is accepted as a real load change.
            A new value during this time (mode: restart) discards the spike.
            Empfehlung / Recommended: 3 s.
          default: 3
          selector:
            number:
              min: 1
              max: 10
              unit_of_measurement: s

    # ══════════════════════════════════════════════════════════════════════════
    # ABSCHNITT 3 / SECTION 3 — Offset-Grenzen / Offset Limits
    # ══════════════════════════════════════════════════════════════════════════
    offset_grenzen:
      name: "📏 Offset-Grenzen / Offset Limits"
      description: >
        Definiert den erlaubten Wertebereich des Offsets — unabhängig von der Netzunruhe.
        Defines the allowed offset range — regardless of grid volatility.
      collapsed: true
      input:

        min_offset:
          name: 📉 Minimaler Offset / Minimum Offset (W)
          description: >
            Aktiv bei ruhigem Netz (StdDev unter Rausch-Schwelle). Sollte die Messungenauigkeit abdecken.
            Active when grid is calm (StdDev below noise floor). Should cover measurement inaccuracy.
            Shelly 3EM: ~5–10 W Rauschen / noise → 30–50 W sinnvoll / recommended.
          default: 30
          selector:
            number:
              min: 0
              max: 200
              unit_of_measurement: W

        cap_offset:
          name: 📈 Maximaler Offset / Maximum Offset (W)
          description: >
            Obere Grenze bei sehr unruhigem Netz. Schützt vor übermäßigem Netzbezug.
            Upper limit for very volatile grids. Prevents excessive grid draw.
            Empfehlung / Recommended: 250 W.
          default: 250
          selector:
            number:
              min: 50
              max: 1000
              unit_of_measurement: W

    # ══════════════════════════════════════════════════════════════════════════
    # ABSCHNITT 4 / SECTION 4 — Volatilitäts-Regler / Volatility Controller
    # ══════════════════════════════════════════════════════════════════════════
    volatilitaet:
      name: "📊 Volatilitäts-Regler / Volatility Controller"
      description: >
        Steuert die Empfindlichkeit des Offsets auf Netzschwankungen.
        Controls how sensitively the offset reacts to grid fluctuations.

        `offset = min_offset + max(0, (StdDev − noise_floor) × factor)`
      collapsed: true
      input:

        noise_floor:
          name: 🔇 Rausch-Schwelle / Noise Floor (W)
          description: >
            StdDev unterhalb dieser Schwelle gilt als Messrauschen — löst keine Offset-Erhöhung aus.
            StdDev below this threshold is treated as measurement noise — no offset increase.
            Empfehlung / Recommended: 15 W (Shelly 3EM).
          default: 15
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: W

        volatility_factor:
          name: 📊 Volatilitäts-Faktor / Volatility Factor
          description: >
            Verstärkung der Netz-Volatilität auf den Offset.
            Amplification of grid volatility on the offset.

            Beispiele / Examples (StdDev=80 W, noise_floor=15 W):
            0.5 → +33 W | 1.5 → +98 W (Standard/Default) | 3.0 → +195 W

            Höher / Higher = mehr Schutz, mehr Bezug / more protection, more draw.
            Empfehlung / Recommended: 1.5.
          default: 1.5
          selector:
            number:
              min: 0.5
              max: 5.0
              step: 0.1

# Neustart bricht laufendes Spike-Bestätigungs-Delay ab / Restart cancels running spike confirmation delay
mode: restart

variables:
  grid_power_sensor: !input grid_power_sensor
  grid_stable_helper: !input grid_stable_helper
  stddev_sensor: !input stddev_sensor
  spike_threshold: !input spike_threshold
  spike_confirm_time: !input spike_confirm_time
  min_offset: !input min_offset
  cap_offset: !input cap_offset
  noise_floor: !input noise_floor
  volatility_factor: !input volatility_factor
  offset_zone1_entity: !input offset_zone1_helper
  offset_zone2_entity: !input offset_zone2_helper
  offset_zone1_valid: >
    {{ offset_zone1_entity is string and offset_zone1_entity | length > 0 }}
  offset_zone2_valid: >
    {{ offset_zone2_entity is string and offset_zone2_entity | length > 0 }}

trigger:
  - platform: state
    entity_id: !input grid_power_sensor

action:
  - condition: template
    value_template: "{{ offset_zone1_valid or offset_zone2_valid }}"

  # ── Schritt 1 / Step 1: Spike-Filterung / Spike Filtering ─────────────────
  - if:
      - condition: template
        value_template: >
          {{ (states(grid_power_sensor) | float(0) - states(grid_stable_helper) | float(0)) | abs
             > spike_threshold | float(300) }}
    then:
      # Sprung zu groß → warten / Jump too large → wait for confirmation
      - delay:
          seconds: "{{ spike_confirm_time | int(3) }}"
      - action: input_number.set_value
        target:
          entity_id: !input grid_stable_helper
        data:
          value: "{{ states(grid_power_sensor) | float(0) }}"
    else:
      # Normaler Wert → sofort übernehmen / Normal value → accept immediately
      - action: input_number.set_value
        target:
          entity_id: !input grid_stable_helper
        data:
          value: "{{ states(grid_power_sensor) | float(0) }}"

  # ── Schritt 2 / Step 2: Offset berechnen / Calculate offset ───────────────
  - variables:
      dynamic_offset: >
        {% set std_dev = states(stddev_sensor) | float(-1) %}
        {% if std_dev < 0 %}
          {{ min_offset | int(30) }}
        {% else %}
          {% set volatility_buffer = [0, (std_dev - noise_floor) * volatility_factor] | max %}
          {% set result = (min_offset + volatility_buffer) | round(0) | int %}
          {{ [[min_offset | int(30), result] | max, cap_offset | int(250)] | min }}
        {% endif %}

  # ── Schritt 3 / Step 3: Offset in Zonen schreiben / Write offset to zones ──
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ offset_zone1_valid }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: "{{ offset_zone1_entity }}"
            data:
              value: "{{ dynamic_offset }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ offset_zone2_valid }}"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: "{{ offset_zone2_entity }}"
            data:
              value: "{{ dynamic_offset }}"
